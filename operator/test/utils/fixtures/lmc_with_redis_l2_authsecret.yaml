# Cross-namespace authSecretRef fixture.
#
# The authSecretRef.namespace is intentionally a placeholder — the test
# overrides it with a per-spec source namespace at runtime so multiple
# specs can run in parallel without colliding on a shared "redis-src".
# The host/port don't need to be reachable; the operator only inspects
# the auth machinery for this smoke.
apiVersion: lmcache.lmcache.ai/v1alpha1
kind: LMCacheEngine
metadata:
  name: smoke-auth
spec:
  nodeSelector: {}
  l1:
    sizeGB: 10
  l2Backend:
    resp:
      host: redis.example.svc.cluster.local
      port: 6379
      authSecretRef:
        name: redis-auth
        namespace: __OVERRIDE_ME__
