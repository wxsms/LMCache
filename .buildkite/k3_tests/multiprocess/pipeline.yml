# Multiprocess tests — one step per test, run in parallel.
# Each step gets its own K8s pod with the exact GPU count it needs.
# Tests are grouped by GPU requirement; the 2-GPU group is listed first so
# these heavier jobs get scheduled before 1-GPU jobs.
#   2-GPU: LMCache+vLLM on GPU 0, baseline on GPU 1 (or TP=2 across both).
#   1-GPU: LMCache+vLLM on GPU 0 only (no baseline server).

steps:
  - group: ":compression: Multiprocess (2-GPU)"
    steps:
      - label: ":compression: vllm_bench"
        command: .buildkite/k3_tests/multiprocess/run.sh vllm_bench
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins:
          - kubernetes:
              podSpec: &pod-2gpu
                containers:
                  - name: container-0
                    image: lmcache/ci-base:latest
                    imagePullPolicy: Never
                    resources: { limits: { "nvidia.com/gpu": "2" } }
                    volumeMounts: &vol-mounts
                      - { name: hf-cache, mountPath: /root/.cache/huggingface }
                volumes: &vols
                  - { name: hf-cache, hostPath: { path: /data/huggingface, type: DirectoryOrCreate } }
        artifact_paths: ["*.log"]

      # HMA (hybrid memory allocator) correctness check on google/gemma-4-31B-it.
      # It interleaves sliding + full attention whose full layers use a larger
      # head_dim (512 vs 256), so vLLM gives its KV cache groups different block
      # sizes -- exercising LMCache's per-group block-size handling. Runs gsm8k,
      # resets vLLM's local prefix cache (LMCache preserved), reruns, and asserts
      # the scores match (run1 == run2 == no-LMCache baseline). Needs 2 GPUs
      # (LMCache+vLLM + baseline). It is public (no HF_TOKEN), forces TRITON_ATTN
      # (so ATTENTION_BACKEND=auto and a non-zero SCORE_TOLERANCE, since
      # TRITON_ATTN is not bit-exact under batch invariance), and its ~63GB of
      # weights need a higher GPU_MEMORY_UTILIZATION than the 0.5 default.
      - label: ":compression: hma_lm_eval_gemma4"
        command: .buildkite/k3_tests/multiprocess/run.sh hma_lm_eval_gemma4
        timeout_in_minutes: 60
        env:
          MODEL: "google/gemma-4-31B-it"
          SCORE_TOLERANCE: "0.05"
          ATTENTION_BACKEND: "auto"
          GPU_MEMORY_UTILIZATION: "0.85"
          # Skip CUDA-graph capture so the large model doesn't time out at launch
          # (safe here: this test uses a tolerance, not the bit-exact check).
          ENFORCE_EAGER: "1"
          # 31B weights are large; allow longer for download + load before the
          # readiness probe gives up (other models keep the 300s default).
          MAX_WAIT_SECONDS: "400"
          # LIMIT = number of gsm8k samples. 31B's large per-token KV makes the
          # full 200-sample working set overflow the CPU pool and thrash, so run
          # 2 misses LMCache; cap the samples and enlarge the pool to keep run 2
          # cache-served. CPU_BUFFER_SIZE (GB) is bounded by node RAM.
          LIMIT: "100"
          CPU_BUFFER_SIZE: "200"
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-2gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: long_doc_qa"
        command: .buildkite/k3_tests/multiprocess/run.sh long_doc_qa
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-2gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: long_doc_qa_l2"
        command: .buildkite/k3_tests/multiprocess/run.sh long_doc_qa_l2
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-2gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: deadlock"
        command: .buildkite/k3_tests/multiprocess/run.sh deadlock
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-2gpu } }]
        artifact_paths: ["*.log"]

  - group: ":compression: Multiprocess (1-GPU)"
    steps:
      - label: ":compression: lm_eval"
        command: .buildkite/k3_tests/multiprocess/run.sh lm_eval
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins:
          - kubernetes:
              podSpec: &pod-1gpu
                containers:
                  - name: container-0
                    image: lmcache/ci-base:latest
                    imagePullPolicy: Never
                    resources: { limits: { "nvidia.com/gpu": "1" } }
                    volumeMounts: *vol-mounts
                volumes: *vols
        artifact_paths: ["*.log"]

      - label: ":compression: fault_tolerance"
        command: .buildkite/k3_tests/multiprocess/run.sh fault_tolerance
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-1gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: restart_recovery"
        command: .buildkite/k3_tests/multiprocess/run.sh restart_recovery
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-1gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: cache_stats"
        command: .buildkite/k3_tests/multiprocess/run.sh cache_stats
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-1gpu } }]
        artifact_paths: ["*.log"]

      - label: ":compression: http_api"
        command: .buildkite/k3_tests/multiprocess/run.sh http_api
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins: [{ kubernetes: { podSpec: *pod-1gpu } }]
        artifact_paths: ["*.log"]

  - group: ":compression: Multiprocess (CPU-only)"
    steps:
      - label: ":compression: cpu_e2e_validation (shm)"
        command: bash .buildkite/k3_tests/multiprocess/scripts/run-cpu-e2e-validation.sh
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - name: container-0
                    image: lmcache/ci-base:latest
                    imagePullPolicy: Never
                    resources:
                      requests:
                        cpu: "8"
                        memory: "256Gi"
                      limits:
                        cpu: "8"
                        memory: "256Gi"
                    volumeMounts:
                      - { name: hf-cache, mountPath: /root/.cache/huggingface }
                      - { name: dshm, mountPath: /dev/shm }
                volumes:
                  - { name: hf-cache, hostPath: { path: /data/huggingface, type: DirectoryOrCreate } }
                  - { name: dshm, emptyDir: { medium: Memory, sizeLimit: 4Gi } }

      - label: ":compression: cpu_e2e_validation (pickle)"
        command: bash .buildkite/k3_tests/multiprocess/scripts/run-cpu-e2e-validation.sh
        env:
          LMCACHE_SHM_NAME: ""
        timeout_in_minutes: 30
        agents: { queue: "k8s" }
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - name: container-0
                    image: lmcache/ci-base:latest
                    imagePullPolicy: Never
                    resources:
                      requests:
                        cpu: "8"
                        memory: "256Gi"
                      limits:
                        cpu: "8"
                        memory: "256Gi"
                    volumeMounts:
                      - { name: hf-cache, mountPath: /root/.cache/huggingface }
                      - { name: dshm, mountPath: /dev/shm }
                volumes:
                  - { name: hf-cache, hostPath: { path: /data/huggingface, type: DirectoryOrCreate } }
                  - { name: dshm, emptyDir: { medium: Memory, sizeLimit: 4Gi } }
